# Serve the built SPA. The key line is the `try_files ... /index.html` fallback
# so client-side routes (/dashboard, /review, ...) don't 404 on direct hits or
# refreshes. Static assets are content-hashed by Vite, so they're cached hard.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defense in depth; API enforces its own too).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;

    # Hashed assets: cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entry: every unknown path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell, so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
