# Render blueprint: API web service + Celery worker + managed Postgres + Redis.
# Frontend deploys separately to Vercel (see vercel.json).
services:
  - type: web
    name: breathe-esg-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false           # set to your Render host, e.g. breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false           # set to your Vercel frontend origin
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: breathe-esg-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: breathe-esg-redis
          property: connectionString

  - type: worker
    name: breathe-esg-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A config worker -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        fromService:
          type: web
          name: breathe-esg-api
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: breathe-esg-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: breathe-esg-redis
          property: connectionString

  - type: redis
    name: breathe-esg-redis
    ipAllowList: []           # internal only
    plan: starter

databases:
  - name: breathe-esg-db
    plan: starter
